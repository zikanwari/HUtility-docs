<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>履修データのインポート方法(Android)</title>
    <link rel="stylesheet" href="./guide.css" />
</head>
<body>
    <main>
        <h1>履修データのインポート方法(Android)</h1>
        <p class="subtitle">iOS版は<a href="./ios.html">こちら</a>からご確認ください。</p>

        <section class="card">
            <h2>はじめに</h2>
            <ul>
                <li>Chromeでの動作を確認しています。他ブラウザでは正常に動作しない場合がありますのでご注意ください。</li>
                <li>スマートフォンに「Files」などの、ファイル管理ができるアプリが入っているか確認してください</li>
            </ul>
        </section>

        <section class="card">
            <h2>操作画面</h2>
            <div class="shot-grid">
                <figure class="shot">
                    <figcaption>1. 「Myもみじ」を開き、「履修」→「履修登録・参照」へと進みます。</figcaption>
                    <img src="./images/momijitop.png" alt="Myもみじのトップ画面" loading="lazy" />
                </figure>
                <figure class="shot">
                    <figcaption>2. アプリに取り込みたいタームを選択してください。</figcaption>
                    <img src="./images/dro1.png" alt="履修登録・参照画面のメニュー" loading="lazy" />
                </figure>
                <figure class="shot">
                    <figcaption>3. 右上のメニュー上部のダウンロードマークをタップしてください。（ダウンロードではなく上の方です）</figcaption>
                    <img src="./images/dro2.png" alt="右上メニューのダウンロードボタン" loading="lazy" />
                </figure>
                <figure class="shot">
                    <figcaption>4. アプリに戻り、「設定」→「履修データのインポート」から、「ファイルを選択」→「写真と動画（出た人は）」を選んでください。</figcaption>
                    <img src="./images/dro3.png" alt="ファイル選択画面" loading="lazy" />
                </figure>
                <figure class="shot">
                    <figcaption>5. 左上の3本線→ダウンロードに進み、先ほどダウンロードしたファイル（履修登録・参照 [CampusSquare]）を選択してください。</figcaption>
                    <img src="./images/dro4.png" alt="ダウンロードフォルダ内の保存ファイル" loading="lazy" />
                </figure>
            </div>
        </section>
    </main>
</body>
</html>
